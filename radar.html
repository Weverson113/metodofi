<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Radar FI® - Descubra seu Índice de Fidelização</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <style>
    :root {
      --color-navy-50: #f0f4f8;
      --color-navy-100: #d9e2ec;
      --color-navy-200: #bcccdc;
      --color-navy-800: #102a43;
      --color-navy-900: #0a192f;
      --color-navy-950: #050d1a;
      --color-gold-400: #facc15;
      --color-gold-500: #d4af37;
      --color-gold-600: #ca8a04;
      --color-neutral-50: #fafafa;
      --color-neutral-100: #f5f5f5;
      --color-neutral-400: #a3a3a3;
      --color-neutral-500: #737373;
      --font-heading: 'Montserrat', sans-serif;
      --font-body: 'Inter', sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      font-family: var(--font-body);
      background: linear-gradient(135deg, var(--color-navy-950) 0%, var(--color-navy-900) 100%);
      color: var(--color-neutral-50);
      line-height: 1.6;
      min-height: 100vh;
    }

    .container { max-width: 900px; margin: 0 auto; padding: 40px 24px; }

    .radar-header { text-align: center; margin-bottom: 48px; }
    .radar-logo {
      display: inline-flex; align-items: center; gap: 12px;
      background: rgba(212, 175, 55, 0.15); padding: 12px 28px;
      border-radius: 9999px; margin-bottom: 24px; border: 1px solid rgba(212, 175, 55, 0.3);
    }
    .radar-logo-icon {
      width: 32px; height: 32px; background: var(--color-gold-500);
      border-radius: 8px; display: flex; align-items: center; justify-content: center; color: var(--color-navy-950);
    }
    .radar-logo-icon svg { width: 20px; height: 20px; }
    .radar-logo-text { font-family: var(--font-heading); font-weight: 700; font-size: 1.25rem; color: var(--color-gold-400); }
    .radar-title {
      font-family: var(--font-heading); font-size: 2.5rem; font-weight: 800; margin-bottom: 16px;
      background: linear-gradient(135deg, #fff 0%, var(--color-gold-400) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .radar-subtitle { font-size: 1.125rem; color: var(--color-neutral-400); font-weight: 300; }

    .progress-container {
      background: rgba(255, 255, 255, 0.05); border-radius: 12px; padding: 6px;
      margin-bottom: 48px; border: 1px solid rgba(255, 255, 255, 0.1);
    }
    .progress-bar {
      height: 12px; background: linear-gradient(90deg, var(--color-gold-500) 0%, var(--color-gold-400) 100%);
      border-radius: 8px; transition: width 0.5s ease; box-shadow: 0 0 20px rgba(212, 175, 55, 0.4);
    }
    .progress-text { text-align: center; margin-top: 12px; font-size: 0.875rem; color: var(--color-neutral-400); }

    .quiz-card {
      background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px; padding: 48px 40px; backdrop-filter: blur(20px);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }

    .question-number {
      background: var(--color-gold-500); color: var(--color-navy-950);
      width: 48px; height: 48px; border-radius: 50%; display: flex;
      align-items: center; justify-content: center; font-weight: 700; font-size: 1.25rem; margin-bottom: 24px;
    }
    .question-text { font-family: var(--font-heading); font-size: 1.5rem; font-weight: 700; margin-bottom: 32px; color: #fff; line-height: 1.3; }

    .options-grid { display: grid; gap: 16px; }
    .option-card {
      background: rgba(255, 255, 255, 0.05); border: 2px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px; padding: 20px 24px; cursor: pointer; transition: all 0.3s ease;
      display: flex; align-items: center; gap: 16px;
    }
    .option-card:hover { background: rgba(212, 175, 55, 0.1); border-color: var(--color-gold-500); transform: translateX(8px); }
    .option-card.selected { background: rgba(212, 175, 55, 0.2); border-color: var(--color-gold-500); box-shadow: 0 0 30px rgba(212, 175, 55, 0.3); }
    
    .option-icon {
      width: 40px; height: 40px; background: rgba(255, 255, 255, 0.1);
      border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .option-icon svg { width: 24px; height: 24px; }
    
    .option-content h4 { font-weight: 600; font-size: 1.125rem; margin-bottom: 4px; color: #fff; }
    .option-content p { font-size: 0.875rem; color: var(--color-neutral-400); }

    .btn-next {
      width: 100%; margin-top: 32px; padding: 20px 40px;
      background: linear-gradient(135deg, var(--color-gold-500) 0%, var(--color-gold-600) 100%);
      color: var(--color-navy-950); border: none; border-radius: 16px;
      font-family: var(--font-heading); font-weight: 700; font-size: 1.125rem;
      cursor: pointer; transition: all 0.3s ease; box-shadow: 0 10px 30px rgba(212, 175, 55, 0.3);
    }
    .btn-next:hover { transform: translateY(-2px); box-shadow: 0 15px 40px rgba(212, 175, 55, 0.4); }
    .btn-next:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    .results-dashboard { display: none; }
    .results-header { text-align: center; margin-bottom: 48px; }

    /* CÍRCULO DO SCORE COM ANEL */
    .score-circle { width: 220px; height: 220px; margin: 0 auto 24px; position: relative; }
    .score-circle canvas { position: absolute; inset: 0; width: 100% !important; height: 100% !important; }
    .score-value {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      font-family: var(--font-heading); font-size: 4rem; font-weight: 800; line-height: 1;
      transition: color 0.5s ease;
    }
    .score-value small { display: block; font-size: 0.875rem; font-weight: 500; color: var(--color-neutral-400); margin-top: 4px; }

      padding:
